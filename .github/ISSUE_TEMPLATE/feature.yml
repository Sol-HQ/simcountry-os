name: Feature Request
description: Propose a new feature for SimCountry OS
title: "[FEATURE] "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the feature request.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature important?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: List the criteria that define completion.
      placeholder: "- [ ] ..."
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add any related context, links, or constraints.
    validations:
      required: false
